<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OpenClaw</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #888;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 42px;
            cursor: pointer;
            color: #888;
            font-size: 18px;
            user-select: none;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .form-group.error input {
            border-color: #e74c3c;
        }

        .form-group.error .error-message {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .divider {
            margin: 24px 0;
            text-align: center;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e1e1e1;
        }

        .divider span {
            position: relative;
            background: white;
            padding: 0 16px;
            color: #888;
            font-size: 13px;
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 2px solid #e1e1e1;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .social-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>✨ OpenClaw</h1>
            <p>智能助手登录</p>
        </div>

        <div class="success-message" id="successMessage">
            🎉 登录成功！正在跳转...
        </div>

        <form id="loginForm">
            <div class="form-group" id="usernameGroup">
                <label for="username">用户名</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="请输入用户名"
                    autocomplete="username"
                >
                <div class="error-message">请输入用户名</div>
            </div>

            <div class="form-group" id="passwordGroup">
                <label for="password">密码</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="请输入密码"
                    autocomplete="current-password"
                >
                <span class="password-toggle" id="passwordToggle">👁️</span>
                <div class="error-message">密码不能少于 6 位</div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                登 录
            </button>
        </form>

        <div class="forgot-password">
            <a href="#">忘记密码？</a>
        </div>

        <div class="divider">
            <span>或使用以下方式登录</span>
        </div>

        <div class="social-login">
            <button class="social-btn" title="微信登录">💬</button>
            <button class="social-btn" title="GitHub 登录">🐙</button>
            <button class="social-btn" title="Google 登录">🔍</button>
        </div>
    </div>

    <script>
        // DOM 元素
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const loginBtn = document.getElementById('loginBtn');
        const successMessage = document.getElementById('successMessage');
        const usernameGroup = document.getElementById('usernameGroup');
        const passwordGroup = document.getElementById('passwordGroup');

        // 密码显示/隐藏
        passwordToggle.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordToggle.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // 表单验证
        function validateUsername() {
            const value = usernameInput.value.trim();
            if (!value) {
                usernameGroup.classList.add('error');
                return false;
            }
            usernameGroup.classList.remove('error');
            return true;
        }

        function validatePassword() {
            const value = passwordInput.value;
            if (value.length < 6) {
                passwordGroup.classList.add('error');
                return false;
            }
            passwordGroup.classList.remove('error');
            return true;
        }

        // 实时验证
        usernameInput.addEventListener('blur', validateUsername);
        passwordInput.addEventListener('blur', validatePassword);

        // 清除错误状态
        usernameInput.addEventListener('input', () => {
            if (usernameInput.value.trim()) {
                usernameGroup.classList.remove('error');
            }
        });
        passwordInput.addEventListener('input', () => {
            if (passwordInput.value.length >= 6) {
                passwordGroup.classList.remove('error');
            }
        });

        // 表单提交
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // 验证
            const isUsernameValid = validateUsername();
            const isPasswordValid = validatePassword();

            if (!isUsernameValid || !isPasswordValid) {
                // 添加抖动效果
                loginForm.classList.add('shake');
                setTimeout(() => loginForm.classList.remove('shake'), 300);
                return;
            }

            // 禁用按钮
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            // 模拟登录请求
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            console.log('登录尝试:', { username, passwordLength: password.length });

            // 模拟 API 请求延迟
            await new Promise(resolve => setTimeout(resolve, 1500));

            // 模拟登录成功（实际使用时替换为真实 API 调用）
            successMessage.style.display = 'block';
            loginBtn.textContent = '✓ 登录成功';

            // 模拟跳转
            setTimeout(() => {
                alert(`欢迎回来，${username}！\n\n这是一个演示页面，实际使用时请连接后端 API。`);
                loginBtn.disabled = false;
                loginBtn.textContent = '登 录';
                successMessage.style.display = 'none';
            }, 1000);
        });

        // 社交登录按钮（演示）
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const platform = btn.getAttribute('title').replace(' 登录', '');
                alert(`${platform}登录功能开发中...\n\n实际使用时请接入对应 OAuth 服务。`);
            });
        });
    </script>
</body>
</html>
